[tox]
envlist =
    {3.10,3.11,3.12}-test
    {3.10,3.11,3.12}-test-numpy{125,126}
    {3.10,3.11,3.12}-test-{numpy,astropy}dev
    codestyle
toxworkdir = /tmp/frb-tox
requires =
    setuptools >= 75.0.0
    pip >= 19.3.1
isolated_build = true

[testenv]
# pytest
allowlist_externals =
    pytest
    pip
# Suppress display of matplotlib plots generated during docs build
setenv =
    MPLBACKEND=agg
    numpydev: PIP_EXTRA_INDEX_URL = https://pypi.anaconda.org/scipy-wheels-nightly/simple
    PYTHONPATH = {toxinidir}


# Pass through the following environment variables which may be needed for the CI
passenv = HOME,WINDIR,LC_ALL,LC_CTYPE,CC,CI

# Run the tests in a temporary directory to make sure that we don't import
# this package from the source tree
#changedir = .tmp/{envname}

# tox environments are constructed with so-called 'factors' (or terms)
# separated by hyphens, e.g. test-devdeps-cov. Lines below starting with factor:
# will only take effect if that factor is included in the environment name. To
# see a list of example environments that can be run, along with a description,
# run:
#
#     tox -l -v
#
description =
    run tests
    devdeps: with the latest developer version of key dependencies
    oldestdeps: with the oldest supported version of key dependencies
    cov: and test coverage
    numpy123: with numpy 1.23.*
    numpy124: with numpy 1.24.*
    numpy125: with numpy 1.25.*
    numpy126: with numpy 1.26.*

# The following provides some specific pinnings for key packages
deps =
    cov: coverage
    numpy123: numpy==1.23.*
    numpy124: numpy==1.24.*
    numpy125: numpy==1.25.*
    numpy126: numpy==1.26.*

    numpydev: numpy>=0.0.dev0
    astropydev: git+https://github.com/astropy/astropy.git#egg=astropy

    linetoolsdev: git+https://github.com/linetools/linetools.git#egg=linetools

# The following indicates which optional dependencies from pyproject.toml will be installed
extras =
    dev

commands =
    pip freeze
    !cov: python -m pytest --pyargs frb {posargs}
    cov: python -m pytest --pyargs frb --cov frb {posargs}
    cov: coverage xml -o {toxinidir}/coverage.xml

[testenv:3.10-test-numpy125]
description = run lightweight tests with numpy 1.25 (without heavy association stack)
skip_install = true
deps =
    numpy==1.25.*
    scipy<1.17
    astropy>=7.1
    importlib_resources
    git+https://github.com/FRBs/ne2001.git@7a2586cf983711c0e645e2f63900973541d4a392#egg=ne2001
    git+https://github.com/linetools/linetools@99e6dbe3ca0fd1f10476dbf1bed8482541692337#egg=linetools
    pandas>=2.2
    photutils>=1.1
    matplotlib>=3.7
    healpy
    tqdm>=4.0
    requests>=2.18
    PyYAML>=5.1
    pytest>=6.0.0
commands =
    python -m pytest frb/tests/test_dmism.py {posargs}

